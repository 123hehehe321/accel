# ═══════════════════════════════════════════════════════════
#  accel TCP 加速器配置文件
#  版本: 0.3 (2.3-D3 起新格式)
#
#  架构: eBPF struct_ops 替换内核 TCP 拥塞控制算法。
#  accel 不拦截流量、不代理、不改包,只是换了"发包决策者"。
#
#  这个文件必须和 accel 二进制在同一目录。
#  修改配置后需要重启 accel 才生效:
#    ./accel stop
#    vim acc.conf
#    sudo ./accel
# ═══════════════════════════════════════════════════════════

# ─── 顶层 ─────────────────────────────────────────────────────
# 必填。启用的算法名字必须是 binary 编译时支持的之一:
#   accel_cubic   稳定基线 (BPF CUBIC 移植)
#   accel_brutal  跨境高丢包场景的激进算法 (需要 [brutal] 段配置)
#
# 启动时若指定算法加载失败 → bail (不静默降级)。
algorithm = "accel_cubic"


# ─── [brutal] 仅当 algorithm = "accel_brutal" 时必填 ────────
# 单 TCP 连接速率上限,Mbps (megabit per second)。
# 100Mbps VPS 设 100,千兆服务器设 1000。
# 范围: 1..=100000 (100 Gbps)。
#[brutal]
#rate_mbps = 100


# ─── [runtime] ────────────────────────────────────────────────
[runtime]
# Unix Socket 路径
# 空字符串 = 智能决策:
#   - 被 systemd 启动  → /run/accel/accel.sock
#   - 手动启动(开发)   → ./accel.sock
socket = ""
