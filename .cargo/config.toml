[env]
# libbpf-sys (transitive dep of libbpf-rs) compiles vendored libbpf via the
# host C compiler. For the musl target, musl-gcc's default include search
# path does NOT cover either of the two places kernel uapi headers live
# on Debian/Ubuntu:
#   /usr/include/x86_64-linux-gnu/    — arch-specific (<asm/*>)
#   /usr/include/                     — arch-neutral   (<asm-generic/*>, <linux/*>)
# Both are shipped by the linux-libc-dev package.
#
# We add both via -idirafter (fallback path, lowest priority) so:
#   - musl's own <bits/*>, <fcntl.h>, <errno.h> etc. resolve first
#     (using -I instead would let glibc's bits/* shadow musl's and
#      break the build with struct flock redefinition).
#   - only headers musl doesn't ship (kernel uapi) fall through.
#
# This is the canonical libbpf + musl cross-compile recipe on Debian.
CFLAGS_x86_64_unknown_linux_musl = "-idirafter /usr/include/x86_64-linux-gnu -idirafter /usr/include"
